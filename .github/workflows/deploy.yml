name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: |
          find dist -name '*.html' -exec sed -i \
            -e 's|src="/media/|src="/PORTFOLIO/media/|g' \
            -e 's|src="/favicon|src="/PORTFOLIO/favicon|g' \
            -e 's|href="/favicon|href="/PORTFOLIO/favicon|g' \
            -e 's|href="/#|href="/PORTFOLIO/#|g' \
            -e 's|href="/projets|href="/PORTFOLIO/projets|g' \
            -e 's|href="/a-propos|href="/PORTFOLIO/a-propos|g' \
            -e 's|href="/contact|href="/PORTFOLIO/contact|g' \
            -e 's|href="/ecrits|href="/PORTFOLIO/ecrits|g' \
            -e 's|url(/media/|url(/PORTFOLIO/media/|g' \
            {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
